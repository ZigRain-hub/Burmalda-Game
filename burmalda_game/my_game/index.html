<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Меллстрой Стрим — Кликер</title>
    <link rel="stylesheet" href="style.css?v=6">
    <script src="https://yandex.ru/games/sdk/v2"></script>
</head>
<body>
    <div class="app">
        <header class="top-bar">
            <div class="logo">💜 БУРМАЛДА 💜</div>
            <div class="top-stats">
                <div class="top-stat">
                    <span class="top-stat-icon">👥</span>
                    <span id="viewers-count">0</span>
                </div>
                <div class="top-stat">
                    <span class="top-stat-icon">💰</span>
                    <span id="coins-count">0</span>
                </div>
                <div class="top-stat">
                    <span class="top-stat-icon">⭐</span>
                    <span id="level-count">1</span>
                </div>
            </div>
            <div class="buff-indicator" id="buff-indicator" style="display:none;">
                🔥 ×2 <span id="buff-timer">10:00</span>
            </div>
            <div class="top-buttons">
                <button class="btn-icon" id="btn-music" title="Музыка">🎵</button>
                <button class="btn-icon" id="btn-sound" title="Звук эффектов">🔊</button>
                <button class="btn-icon" id="btn-save" title="Сохранить">💾</button>
                <button class="btn-icon" id="btn-reset" title="Сброс">🗑️</button>
            </div>
        </header>

        <div class="main-layout">
            <div class="stream-area">
                <!-- ЛЕВАЯ ПАНЕЛЬ: Магазин Меллстройности -->
                <div class="left-panel" id="shop-panel">
                    <div class="panel-header" id="shop-toggle">
                        <span>🛒 МАГАЗИН</span>
                        <span class="toggle-icon" id="shop-toggle-icon">◀</span>
                    </div>
                    <div class="panel-body" id="shop-body">
                        <div class="shop-items" id="shop-items"></div>
                    </div>
                </div>

                <!-- ЦЕНТР: Стрим + Меллстрой -->
                <div class="stream-center">
                    <div class="stream-screen" id="click-zone">
                        <div class="stream-room">
                            <div class="room-bg">
                                <div class="streamer-img-full" id="streamer-img">
                                    <img src="mellstroy1.png" alt="Меллстрой" id="streamer-png" onerror="this.style.display='none';this.parentElement.innerHTML='🎙️';">
                                </div>
                                <div class="donation-alert" id="donation-alert" style="display:none;">
                                    <div class="donation-amount" id="donation-amount">50 $</div>
                                    <div class="donation-name" id="donation-name">Имя</div>
                                </div>
                            </div>
                        </div>
                        <div class="click-particles" id="particles"></div>
                    </div>

                    <!-- НИЖНЯЯ ПАНЕЛЬ: Спец предложения -->
                    <div class="special-panel" id="special-panel">
                        <div class="special-header" id="special-toggle">
                            <span>⚡ СПЕЦ</span>
                            <span class="toggle-icon" id="special-toggle-icon">▲</span>
                        </div>
                        <div class="special-body" id="special-body">
                            <div class="special-items" id="special-items"></div>
                        </div>
                    </div>
                </div>

                <!-- ПРАВАЯ ПАНЕЛЬ: Чат -->
                <div class="side-panel" id="chat-panel">
                    <div class="panel-header" id="chat-toggle">
                        <span>💬 ЧАТ</span>
                        <span class="toggle-icon" id="chat-toggle-icon">▼</span>
                    </div>
                    <div class="panel-body" id="chat-body">
                        <div class="chat-messages" id="chat-messages"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <audio id="bg-music" loop>
        <source src="music.mp3" type="audio/mpeg">
        <source src="music.ogg" type="audio/ogg">
    </audio>

    <script src="game.js?v=6"></script>
</body>
</html>
